name: Setup porter
description: Download and install the porter CLI at a pinned version.
author: Tractorbeam

inputs:
  version:
    description: |
      porter release tag (e.g. `v0.6.0`) or `latest`. Pinning is strongly
      recommended; `latest` resolves at runtime via the GitHub API.
    required: false
    default: latest
  install-dir:
    description: Directory to install the binary into.
    required: false
    default: ${{ runner.tool_cache }}/porter
  github-token:
    description: |
      Token used to call the GitHub API. Default `GITHUB_TOKEN` is fine for
      a public porter release; pass a PAT only when consuming a private
      mirror.
    required: false
    default: ${{ github.token }}

outputs:
  version:
    description: The resolved version that was installed.
    value: ${{ steps.resolve.outputs.version }}
  path:
    description: Absolute path of the installed binary.
    value: ${{ steps.install.outputs.path }}

# The actual logic lives in setup.sh; this action.yml only wires up the
# inputs/outputs and invokes the script per step. setup.sh is covered by
# the bats suite under `tests/` so the install path stays exercised
# without needing a real GitHub Releases round-trip.
runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REQ_VERSION: ${{ inputs.version }}
      run: |
        "$GITHUB_ACTION_PATH/setup.sh" resolve

    - id: install
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        VERSION: ${{ steps.resolve.outputs.version }}
        INSTALL_DIR: ${{ inputs.install-dir }}
      run: |
        "$GITHUB_ACTION_PATH/setup.sh" install
