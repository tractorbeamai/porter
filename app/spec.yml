# Configuration spec for the porter privileged-tagger GitHub App.
#
# This file is a *spec*, not an installer input — GitHub removed the
# "create App from manifest" flow (both the `from-manifest` API and
# the matching UI), so there's no way to import this directly. Create
# the App by hand and copy the values below into the form.
#
# Steps in app/README.md. Short version: org settings → Developer
# settings → GitHub Apps → New GitHub App, fill in `name`,
# `description`, `homepage` (= `url`), and tick the permissions /
# events listed here. Then generate a private key, install on the
# repo, and store the App ID + key as repository secrets
# `PORTER_APP_ID` and `PORTER_APP_PRIVATE_KEY`. The reusable
# workflows exchange these for an installation token via
# `actions/create-github-app-token@v2` and pass it through
# `secrets.app-token`.

name: porter
description: |
  Sole privileged tagger for porter-driven release lines. The repo
  ruleset configured by `tools/install-ruleset.sh` blocks `v*` tag
  pushes from any other identity, so a release can only originate from
  this App's installation token.
url: https://github.com/tractorbeamai/porter
public: false
default_events:
  # We don't run a webhook handler in v1; events are listed for future
  # use (Phase D verification flows may consume push/check_run events).
  - push

default_permissions:
  # Push tag refs and (via the rolling Version PR) commits on a release
  # branch. `contents: write` is the minimum that covers tag creation.
  contents: write
  # Open and update the rolling "Version Packages" PR.
  pull_requests: write
  # Read the workflow run state during release post-mortems.
  actions: read
  # Phase D: Sigstore keyless signing requires the App's installation
  # token to be exchangeable for a workload identity OIDC token.
  id_token: write
  # Phase D: read-only access to attestation metadata stored as
  # repository attestations.
  attestations: write
