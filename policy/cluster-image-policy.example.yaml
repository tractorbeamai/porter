# Phase E: admission policy that refuses any image whose attestation
# chain doesn't validate against porter's signing identity.
#
# Install path:
#   1. helm install policy-controller sigstore/policy-controller -n cosign-system --create-namespace
#   2. Replace `<consumer-repo>` and `<image-glob>` below with your values.
#   3. kubectl apply -f cluster-image-policy.yaml
#   4. Label namespaces you want gated: `kubectl label ns <ns> policy.sigstore.dev/include=true`
#
# Reference:
#   https://docs.sigstore.dev/policy-controller/overview/

apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: porter-issued-only
spec:
  images:
    # Restrict to images that came out of porter's pipeline. Other images
    # (kube-system, third-party operators, etc.) flow through unmodified.
    - glob: "<image-glob>"  # e.g. ghcr.io/<org>/* or 575108936009.dkr.ecr.*

  authorities:
    - name: porter-keyless
      keyless:
        url: https://fulcio.sigstore.dev
        identities:
          # Fulcio's certificate subject is the URL of the workflow file
          # that requested the OIDC token. Pinning to porter's reusable
          # release.yml workflow means no other workflow's keyless
          # signature will satisfy the policy.
          - issuer: https://token.actions.githubusercontent.com
            subjectRegExp: "^https://github\\.com/tractorbeamai/porter/\\.github/workflows/release\\.yml@refs/tags/v[0-9]+(\\.[0-9]+){2}$"
      ctlog:
        url: https://rekor.sigstore.dev

      attestations:
        - name: slsa-provenance
          predicateType: https://slsa.dev/provenance/v1
          policy:
            type: cue
            data: |
              // Tighten the predicate. The build identity must be
              // porter's, the source repo must match the consuming
              // repo, and the source ref must look like a release tag.
              predicateType: "https://slsa.dev/provenance/v1"
              predicate: {
                runDetails: {
                  builder: {
                    id: "https://github.com/tractorbeamai/porter"
                  }
                }
                buildDefinition: {
                  externalParameters: {
                    source: =~ "^git\\+https://github\\.com/<consumer-repo>@refs/tags/v[0-9]+(\\.[0-9]+){2}$"
                  }
                }
              }
