"$schema" = "./schemas/porter.toml.json"

[changesets]
directory = ".changeset"

[release]
changelog = "CHANGELOG.md"
# Conventional Commits subject for the rolling Version PR, so the
# squash-merged release commit reads `chore(release): X.Y.Z` on main.
version_pr_title = "chore(release): {version}"

# porter releases itself as a single group. The Cargo workspace version is the
# release line and cascades to every member crate; the same release builds the
# porter CLI. `tag_prefix = "v"` keeps bare `vX.Y.Z` tags (the default stem
# would be `porter/v`).
[[group]]
name = "default"
components = [
  { id = "porter", type = "cargo-workspace", path = "Cargo.toml", tag_prefix = "v", artifact = { kind = "cli-binary", package = "porter-cli", targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
  ] } },
  # Cargo.lock records that same version for each workspace member, so it must
  # bump in lockstep or `cargo build --locked` (CI + the release workflow)
  # fails. It publishes nothing, so it carries no artifact and gets no tag.
  { id = "cargo-lock", type = "regex", path = "Cargo.lock", pattern = 'name = "porter-(?:core|cli)"\nversion = "(?P<version>[0-9]+\.[0-9]+\.[0-9]+)"' },
]
