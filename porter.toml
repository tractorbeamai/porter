"$schema" = "./schemas/porter.toml.json"

[changesets]
directory = ".changeset"
mode = "single"

# Version-bearing files for porter itself. Just the Cargo workspace for
# now — the workspace.package.version cascades to every member crate.
[[versioned_files]]
type = "cargo-workspace"
path = "Cargo.toml"

[release]
tag_prefix = "v"
changelog = "CHANGELOG.md"

# porter publishes a single artifact: itself. The cli-binary block
# expands per-target inside the release workflow's matrix; each row runs
# `porter build cli-binary --target <triple>` on a matching runner and
# uploads the resulting tarball to the GitHub Release.
[[artifacts]]
kind = "cli-binary"
name = "porter"
package = "porter-cli"
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
