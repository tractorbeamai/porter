name: porter / version

# Reusable workflow consumer repos call to maintain a rolling "Version
# Packages" PR. On every push to the default branch, runs `porter version`
# in dry-run mode to compute the next bump, then opens or updates a PR
# that, when merged, lands the version bump as a single commit on `main`.
#
# Credential policy: see README "Privileged tagger".

on:
  workflow_call:
    inputs:
      porter-version:
        description: porter CLI version to install.
        required: false
        type: string
        default: latest
      branch:
        description: Branch the rolling Version PR lives on.
        required: false
        type: string
        default: porter/version
      title:
        description: |
          Optional override for the Version PR title, used verbatim. When empty
          (default), the title comes from porter.toml `[release].version_pr_title`
          (with `{version}` filled in when a single group bumps).
        required: false
        type: string
        default: ""
      build-from-source:
        description: |
          Build the porter CLI from the checked-out source instead of
          installing a released binary. porter sets this on its own repo so a
          push that changes porter's config format is processed by the porter
          it ships, not the previously-released one. Consumers leave it false.
        required: false
        type: boolean
        default: false
    secrets:
      app-id:
        description: |
          porter App ID. The workflow mints an installation token from this
          and `app-private-key` to push the version branch and open the PR —
          GITHUB_TOKEN can't, because the repo ruleset only lets the App write
          protected refs.
        required: true
      app-private-key:
        description: porter App private key (PEM), paired with `app-id`.
        required: true

# GITHUB_TOKEN stays read-only: every mutation in this workflow — the
# branch push and all `gh pr` calls — is authenticated with an App token
# minted in-job from `app-id`/`app-private-key`, never GITHUB_TOKEN.
# Requesting write here would be a dead permission, and because a reusable
# workflow can only narrow the caller's grant (never widen it), it would
# also force every consumer to grant their GITHUB_TOKEN write to call us.
permissions:
  contents: read

jobs:
  rolling-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout only; writes go through the App token
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          # Don't persist the App token in git config; the branch push
          # below uses an explicit auth URL so the credential is
          # scoped to a single `git push` invocation.
          persist-credentials: false

      # Released binary for consumers; source build for porter's own repo (the
      # released CLI can't parse a push that changes porter's own config —
      # same bootstrap as porter-release.yml).
      - name: Build porter from source
        if: inputs.build-from-source
        run: |
          cargo build --bin porter --locked
          echo "$PWD/target/debug" >> "$GITHUB_PATH"

      - uses: tractorbeamai/porter/actions/setup-porter@24e837ff87438fdb4fc0ba784c666fcb520ea9bc # v0
        if: ${{ !inputs.build-from-source }}
        with:
          version: ${{ inputs.porter-version }}

      - name: Compute release status
        id: next
        run: |
          set -euo pipefail
          status_json=$(porter status --json)
          echo "$status_json"
          # `.pr_title` is the release/skip signal: porter sets it to null
          # exactly when no group has pending changesets. There's no single
          # top-level `.next` anymore — each group has its own under `.groups`.
          pr_title=$(echo "$status_json" | jq -r '.pr_title // empty')
          if [[ -z "$pr_title" || "$pr_title" == "null" ]]; then
            echo "no pending changesets; nothing to do"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "pr_title=$pr_title" >> "$GITHUB_OUTPUT"
          # Per-group summary of the moving lines, for the PR body.
          summary=$(echo "$status_json" | jq -r '.groups[] | select(.next) | "- **\(.name)**: \(.current) → \(.next)"')
          {
            echo "summary<<__PORTER_EOF__"
            echo "$summary"
            echo "__PORTER_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Apply version bump
        if: steps.next.outputs.skip != 'true'
        run: porter version

      # credential: app-token — minted in this job (not passed across jobs,
      # which would have it revoked before use) and used in the step below to
      # push the protected version branch and open the PR as porter[bot].
      # Uses create-github-app-token directly rather than porter's composite,
      # since this workflow runs in the consumer's checkout, not porter's.
      - name: Mint app token
        id: app-token
        if: steps.next.outputs.skip != 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.app-id }}
          private-key: ${{ secrets.app-private-key }}
          permission-contents: write
          permission-pull-requests: write

      # credential: app-token — pushes the protected version branch and opens
      # the PR as porter[bot]; GITHUB_TOKEN can't write the branch under the
      # ruleset, and a PR it opened wouldn't trigger the PR's CI checks.
      - name: Open or update Version PR
        if: steps.next.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ inputs.branch }}
          # `title` input is an optional override; when empty, use the title
          # porter rendered from porter.toml `[release].version_pr_title`.
          TITLE: ${{ inputs.title }}
          PR_TITLE: ${{ steps.next.outputs.pr_title }}
          SUMMARY: ${{ steps.next.outputs.summary }}
          # Route github-context strings through env vars rather than
          # ${{ ... }} expansion inside the shell to avoid template
          # injection (zizmor `template-injection` audit).
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          # The `title` input, when provided, is used verbatim. Otherwise use
          # the title porter rendered from porter.toml. Fall back to a plain
          # default when `pr_title` is somehow absent so the title is never
          # empty.
          if [[ -n "$TITLE" ]]; then
            title="$TITLE"
          elif [[ -n "$PR_TITLE" ]]; then
            title="$PR_TITLE"
          else
            title="Version Packages"
          fi

          git config user.name "porter[bot]"
          git config user.email "porter[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add -A
          git commit -m "$title"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:$BRANCH"

          notes=$(porter release notes || true)
          # `porter release notes` emits markdown (a `### Features` section,
          # bullets); include it unfenced so the PR body renders it as
          # formatted release notes rather than a literal code block.
          body=$(printf '%s\n\n%s\n\n%s\n' \
            "Rolling release PR maintained by porter. Merging it lands the version bump(s) below and triggers the release workflow." \
            "$SUMMARY" \
            "$notes")

          existing=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || true)
          if [[ -n "$existing" ]]; then
            gh pr edit "$existing" --title "$title" --body "$body"
          else
            gh pr create --head "$BRANCH" --base "$DEFAULT_BRANCH" \
              --title "$title" --body "$body"
          fi
