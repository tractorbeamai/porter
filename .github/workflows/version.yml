name: porter / version

# Reusable workflow consumer repos call to maintain a rolling "Version
# Packages" PR. On every push to the default branch, runs `porter version`
# in dry-run mode to compute the next bump, then opens or updates a PR
# that, when merged, lands the version bump as a single commit on `main`.

on:
  workflow_call:
    inputs:
      porter-version:
        description: porter CLI version to install.
        required: false
        type: string
        default: latest
      branch:
        description: Branch the rolling Version PR lives on.
        required: false
        type: string
        default: porter/version
      title:
        description: Title for the rolling Version PR.
        required: false
        type: string
        default: "Version Packages"
    secrets:
      app-token:
        description: |
          Token to push the version branch and open the PR. Should be a
          porter App installation token (not GITHUB_TOKEN), so that the
          eventual tag-push originates from the same identity allowed by
          the repo ruleset.
        required: true

# GITHUB_TOKEN stays read-only: every mutation in this workflow — the
# branch push and all `gh pr` calls — is authenticated with the App
# token passed in as `app-token`, never GITHUB_TOKEN. Requesting write
# here would be a dead permission, and because a reusable workflow can
# only narrow the caller's grant (never widen it), it would also force
# every consumer to grant their GITHUB_TOKEN write just to call us.
permissions:
  contents: read

jobs:
  rolling-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout only; writes go through the App token
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # Don't persist the App token in git config; the branch push
          # below uses an explicit auth URL so the credential is
          # scoped to a single `git push` invocation.
          persist-credentials: false

      - uses: tractorbeamai/porter/actions/setup-porter@v0
        with:
          version: ${{ inputs.porter-version }}

      - name: Compute next version
        id: next
        run: |
          set -euo pipefail
          status_json=$(porter status --json)
          echo "$status_json"
          next=$(echo "$status_json" | jq -r '.next // empty')
          if [[ -z "$next" || "$next" == "null" ]]; then
            echo "no pending changesets; nothing to do"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Apply version bump
        if: steps.next.outputs.skip != 'true'
        run: porter version

      - name: Open or update Version PR
        if: steps.next.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.app-token }}
          BRANCH: ${{ inputs.branch }}
          TITLE: ${{ inputs.title }}
          NEXT: ${{ steps.next.outputs.next }}
          # Route github-context strings through env vars rather than
          # ${{ ... }} expansion inside the shell to avoid template
          # injection (zizmor `template-injection` audit).
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git config user.name "porter[bot]"
          git config user.email "porter[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add -A
          git commit -m "$TITLE: $NEXT"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:$BRANCH"

          notes=$(porter release notes || true)
          # printf's format string is intentionally single-quoted so
          # the backticks render literally (markdown code fence); the
          # data args do the variable expansion.
          # shellcheck disable=SC2016
          body=$(printf '%s\n\n```\n%s\n```\n' \
            "Rolling release PR maintained by porter. Merging this lands version **$NEXT** and triggers the release workflow." \
            "$notes")

          existing=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || true)
          if [[ -n "$existing" ]]; then
            gh pr edit "$existing" --title "$TITLE: $NEXT" --body "$body"
          else
            gh pr create --head "$BRANCH" --base "$DEFAULT_BRANCH" \
              --title "$TITLE: $NEXT" --body "$body"
          fi
