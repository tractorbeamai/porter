name: version-self

# porter dogfoods its own rolling-Version-PR workflow. On every push
# to main, the reusable `version.yml` runs `porter status`, applies
# any pending bump in a working copy, and opens (or updates) a
# "Version Packages" PR that — when merged — lands the bump on main.
# `tag-on-version-merge.yml` then pushes the matching `v*` tag, which
# triggers `porter-release.yml` to build and publish.
#
# The mint job exists separately so the App-token output can be
# passed into the reusable workflow as a secret. Per
# `actions/create-github-app-token` docs, tokens forwarded through
# job outputs stay masked in downstream jobs' logs.
#
# Credential policy: see README "Privileged tagger".

on:
  push:
    branches: [main]

permissions:
  contents: read

# Serialize main pushes so two runs can't race on the version branch's
# force-push; don't cancel an in-flight run mid-push.
concurrency:
  group: version-self-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mint:
    runs-on: ubuntu-latest
    outputs:
      token: ${{ steps.app-token.outputs.token }}
    steps:
      # Checkout only so the local ./actions/mint-porter-token composite is
      # on disk; no credentials persisted — this job's sole output is the token.
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      # credential: app-token — version.yml pushes the protected version branch
      # and opens the Version Packages PR as porter[bot] (GITHUB_TOKEN can't
      # write the branch under the ruleset, and a PR it opened wouldn't trigger
      # CI). Scoped to what version.yml uses, not the App's full install rights.
      - id: app-token
        uses: ./actions/mint-porter-token
        with:
          app-id: ${{ secrets.PORTER_APP_ID }}
          private-key: ${{ secrets.PORTER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

  rolling-pr:
    needs: mint
    uses: ./.github/workflows/version.yml
    secrets:
      app-token: ${{ needs.mint.outputs.token }}
