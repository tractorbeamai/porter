name: version-self

# porter dogfoods its own rolling-Version-PR workflow. On every push
# to main, the reusable `version.yml` runs `porter status`, applies
# any pending bump in a working copy, and opens (or updates) a
# "Version Packages" PR that — when merged — lands the bump on main.
# `tag-on-version-merge.yml` then pushes the matching `v*` tag, which
# triggers `porter-release.yml` to build and publish.
#
# We hand version.yml the App credentials and let it mint the token in
# the job that uses it. (Minting here and passing the token across the
# job boundary into the reusable would fail: create-github-app-token
# revokes the token in its post step, so the reusable would get an
# already-invalid token.)
#
# Credential policy: see README "Privileged tagger".

on:
  push:
    branches: [main]

permissions:
  contents: read

# Serialize main pushes so two runs can't race on the version branch's
# force-push; don't cancel an in-flight run mid-push.
concurrency:
  group: version-self-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rolling-pr:
    uses: ./.github/workflows/version.yml
    with:
      # Run the porter the change ships, not the released CLI — porter's own
      # config format can change in the very push this processes.
      build-from-source: true
    secrets:
      app-id: ${{ secrets.PORTER_APP_ID }}
      app-private-key: ${{ secrets.PORTER_APP_PRIVATE_KEY }}
