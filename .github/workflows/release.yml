name: porter / release

# Reusable workflow for consumer repos. The flow:
#
#   1. tag         — push every pending component tag (porter App identity)
#                    and open a GitHub Release per tag.
#   2. plan        — `porter matrix` emits a job matrix from porter.toml.
#   3. build (×N)  — fan out across artifact rows; each publishes under its
#                    own component tag/version and logs in to its own registry.
#   4. publish     — merge per-row checksums into each release.
#
# porter cuts one tag per published component (`<id>/v<version>`, or a custom
# `tag_prefix`), so a release may carry several tags at independent versions —
# every matrix row carries its own `tag`, `version`, `registry`, and registry
# auth. A row is signed when `porter matrix` sets `sign=true` on it.
#
# Credential policy: see README "Privileged tagger". An App token minted in-job
# writes the protected tags; GITHUB_TOKEN handles release uploads and OIDC
# signing. Registries with `basic`/`token` auth read their credentials from the
# `registry-auth` JSON secret (Actions can't index `secrets` by a dynamic key).

on:
  workflow_call:
    inputs:
      porter-version:
        description: porter CLI version to install.
        required: false
        type: string
        default: latest
    secrets:
      app-id:
        description: |
          porter App ID. The workflow mints an installation token from this
          and `app-private-key` to push the release tags — the repo ruleset
          rejects a tag push from any other identity.
        required: true
      app-private-key:
        description: porter App private key (PEM), paired with `app-id`.
        required: true
      npm-token:
        description: |
          Fallback npm auth token, used by an `npm-package` artifact whose
          registry declares no auth (the default `registry.npmjs.org`).
          Registries with explicit `token` auth use `registry-auth` instead.
        required: false
      registry-auth:
        description: |
          JSON object mapping secret name → value, e.g.
          `{"DH_USER":"...","DH_PAT":"..."}`. Each `[registries.*]` entry with
          `basic`/`token` auth names the keys it needs here. Required only if
          a referenced registry uses basic/token auth.
        required: false

permissions:
  contents: read

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tags: ${{ steps.matrix.outputs.tags }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      has-artifacts: ${{ steps.matrix.outputs.has-artifacts }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: tractorbeamai/porter/actions/setup-porter@a0a2f1069f0f34404ace47818b773b75ba5d0a3c # v0
        with:
          version: ${{ inputs.porter-version }}

      # credential: app-token — minted in this job and used below to push the
      # protected tags and author the Releases as porter[bot].
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.app-id }}
          private-key: ${{ secrets.app-private-key }}
          permission-contents: write

      # credential: app-token — pushes the protected component tags; the ruleset
      # rejects a tag push from any other identity. Idempotent: skips tags the
      # remote already has.
      - id: cut
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name "porter[bot]"
          git config user.email "porter[bot]@users.noreply.github.com"
          refs=()
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
              echo "tag $tag already exists; skipping"
            else
              git tag -a "$tag" -m "Release $tag"
              refs+=("refs/tags/$tag")
            fi
          done < <(porter release tag)
          if [[ ${#refs[@]} -gt 0 ]]; then
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${refs[@]}"
          fi

      - id: matrix
        run: |
          set -euo pipefail
          matrix=$(porter matrix --compact)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          rows=$(echo "$matrix" | jq '.include | length')
          if [[ "$rows" -gt 0 ]]; then
            echo "has-artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-artifacts=false" >> "$GITHUB_OUTPUT"
          fi
          # The unique tags this release cuts, for the publish job.
          tags=$(echo "$matrix" | jq -r '.include[].tag' | sort -u)
          {
            echo "tags<<__PORTER_EOF__"
            echo "$tags"
            echo "__PORTER_EOF__"
          } >> "$GITHUB_OUTPUT"

      # credential: app-token — deliberate exception to "API calls → github.token":
      # we author the Releases as porter[bot] for provenance. One Release per
      # tag, with notes from that tag's group's changelog.
      - name: Create GitHub Releases
        if: steps.matrix.outputs.has-artifacts == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          MATRIX: ${{ steps.matrix.outputs.matrix }}
        run: |
          set -euo pipefail
          # Unique (tag, group) pairs — one Release each.
          echo "$MATRIX" | jq -rc '.include[] | {tag, group}' | sort -u | while read -r row; do
            tag=$(jq -r '.tag' <<< "$row")
            group=$(jq -r '.group' <<< "$row")
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "release $tag already exists"
            else
              notes_file=$(mktemp)
              porter release notes --group "$group" > "$notes_file" || true
              gh release create "$tag" --title "$tag" --notes-file "$notes_file"
            fi
          done

  build:
    needs: tag
    if: needs.tag.outputs.has-artifacts == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.tag.outputs.matrix) }}
    permissions:
      contents: write
      packages: write
      id-token: write  # OIDC token for cosign keyless signing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ matrix.tag }}
          persist-credentials: false

      - uses: tractorbeamai/porter/actions/setup-porter@a0a2f1069f0f34404ace47818b773b75ba5d0a3c # v0
        with:
          version: ${{ inputs.porter-version }}

      - name: Install cosign
        if: matrix.sign == 'true'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      # ----- registry login (OCI: oci-image + helm-chart) ----------------
      # helm push to an OCI registry reads the same ~/.docker/config.json that
      # `docker login` writes, so one step covers both kinds. Credentials come
      # from GITHUB_TOKEN (github-token auth) or the `registry-auth` JSON
      # secret (basic auth), keyed by the secret names porter put on the row.
      - name: Registry login
        if: (matrix.kind == 'oci-image' || matrix.kind == 'helm-chart') && matrix.auth_kind != 'none'
        env:
          AUTH_KIND: ${{ matrix.auth_kind }}
          REGISTRY: ${{ matrix.registry }}
          ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
          REGISTRY_AUTH: ${{ secrets.registry-auth }}
          USERNAME_SECRET: ${{ matrix.username_secret }}
          PASSWORD_SECRET: ${{ matrix.password_secret }}
        run: |
          set -euo pipefail
          # Registry host = up to the first '/', after stripping any oci:// prefix.
          host="${REGISTRY#oci://}"; host="${host%%/*}"
          case "$AUTH_KIND" in
            github-token)
              user="$ACTOR"; pass="$GITHUB_TOKEN" ;;
            basic)
              user=$(jq -r --arg k "$USERNAME_SECRET" '.[$k] // empty' <<< "$REGISTRY_AUTH")
              pass=$(jq -r --arg k "$PASSWORD_SECRET" '.[$k] // empty' <<< "$REGISTRY_AUTH")
              ;;
            *)
              echo "::error::OCI registry auth_kind '$AUTH_KIND' is unsupported (use github-token or basic)" >&2
              exit 1 ;;
          esac
          if [[ -z "$pass" ]]; then
            echo "::error::no credential resolved for $host (check the registry-auth secret)" >&2
            exit 1
          fi
          echo "$pass" | docker login "$host" -u "$user" --password-stdin

      # ----- cli-binary --------------------------------------------------
      - name: Add Rust target
        if: matrix.kind == 'cli-binary'
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "$TARGET"

      - name: Build cli-binary
        if: matrix.kind == 'cli-binary'
        env:
          NAME: ${{ matrix.name }}
          TARGET: ${{ matrix.target }}
        run: porter build cli-binary --name "$NAME" --target "$TARGET"

      # credential: github.token — uploads to the component's release; an API
      # call, not a ref write.
      - name: Upload cli-binary tarball
        if: matrix.kind == 'cli-binary'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ matrix.tag }}
          NAME: ${{ matrix.name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" --clobber "dist/${NAME}-${TARGET}.tar.gz"
          # Per-row checksum file; the publish job merges them per release.
          gh release upload "$TAG" --clobber "dist/checksums.txt#checksums-${NAME}-${TARGET}.txt"

      - name: Sign + attest cli-binary
        if: matrix.kind == 'cli-binary' && matrix.sign == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ matrix.tag }}
          NAME: ${{ matrix.name }}
          TARGET: ${{ matrix.target }}
          FULCIO_URL: ${{ matrix.fulcio_url }}
          REKOR_URL: ${{ matrix.rekor_url }}
        run: |
          set -euo pipefail
          art="dist/${NAME}-${TARGET}.tar.gz"
          sig="dist/${NAME}-${TARGET}.sig.bundle"
          att="dist/${NAME}-${TARGET}.att.bundle"
          cosign sign-blob --yes \
            --fulcio-url "$FULCIO_URL" --rekor-url "$REKOR_URL" \
            --bundle "$sig" "$art"
          # Pin the source ref to this component's tag.
          porter attest --emit predicate --source-ref "refs/tags/${TAG}" > predicate.json
          cosign attest-blob --yes \
            --fulcio-url "$FULCIO_URL" --rekor-url "$REKOR_URL" \
            --predicate predicate.json --type slsaprovenance1 \
            --bundle "$att" "$art"
          gh release upload "$TAG" --clobber "$sig" "$att"

      # ----- oci-image ---------------------------------------------------
      - name: Set up Docker Buildx
        if: matrix.kind == 'oci-image'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build & push image
        id: build_image
        if: matrix.kind == 'oci-image'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: ${{ matrix.platforms }}
          tags: ${{ matrix.registry }}:${{ matrix.version }}
          provenance: false  # porter issues its own SLSA attestation below

      - name: Sign + attest image
        if: matrix.kind == 'oci-image' && matrix.sign == 'true'
        env:
          TAG: ${{ matrix.tag }}
          REGISTRY: ${{ matrix.registry }}
          DIGEST: ${{ steps.build_image.outputs.digest }}
          FULCIO_URL: ${{ matrix.fulcio_url }}
          REKOR_URL: ${{ matrix.rekor_url }}
        run: |
          set -euo pipefail
          ref="${REGISTRY}@${DIGEST}"
          cosign sign --yes \
            --fulcio-url "$FULCIO_URL" --rekor-url "$REKOR_URL" "$ref"
          porter attest --emit predicate --source-ref "refs/tags/${TAG}" > predicate.json
          cosign attest --yes \
            --fulcio-url "$FULCIO_URL" --rekor-url "$REKOR_URL" \
            --predicate predicate.json --type slsaprovenance1 "$ref"

      # ----- helm-chart --------------------------------------------------
      - name: Package & push Helm chart
        id: push_chart
        if: matrix.kind == 'helm-chart'
        env:
          VERSION: ${{ matrix.version }}
          CHART: ${{ matrix.chart }}
          REGISTRY: ${{ matrix.registry }}
        run: |
          set -euo pipefail
          # `helm package` won't fetch a chart's dependencies; they must be
          # vendored under charts/ first or packaging fails on any chart with
          # remote subcharts. Resolve them explicitly (the changesets-#432
          # lesson: own the prepare step, don't trust the packager to do it).
          # A committed Chart.lock builds reproducibly from the lock; deps
          # declared without a lock fall back to update (resolve + fetch);
          # a dependency-free chart skips both and packages as before.
          if [[ -f "$CHART/Chart.lock" ]]; then
            helm dependency build "$CHART"
          elif grep -q '^dependencies:' "$CHART/Chart.yaml"; then
            helm dependency update "$CHART"
          fi
          helm package "$CHART" --version "$VERSION" --app-version "$VERSION" -d dist
          shopt -s nullglob
          pkgs=(dist/*.tgz)
          if [[ ${#pkgs[@]} -eq 0 ]]; then
            echo "::error::helm package produced no .tgz in dist/" >&2
            exit 1
          fi
          out=$(helm push "${pkgs[0]}" "$REGISTRY" 2>&1)
          echo "$out"
          digest=$(printf '%s\n' "$out" | sed -n 's/^Digest: \(sha256:[0-9a-f]\{64\}\)$/\1/p')
          pushed=$(printf '%s\n' "$out" | sed -n 's/^Pushed: \(.*\)$/\1/p')
          if [[ -n "$digest" && -n "$pushed" ]]; then
            echo "ref=${pushed%:*}@${digest}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign + attest Helm chart
        if: matrix.kind == 'helm-chart' && matrix.sign == 'true'
        env:
          TAG: ${{ matrix.tag }}
          REF: ${{ steps.push_chart.outputs.ref }}
          FULCIO_URL: ${{ matrix.fulcio_url }}
          REKOR_URL: ${{ matrix.rekor_url }}
        run: |
          set -euo pipefail
          if [[ -z "$REF" ]]; then
            echo "::error::could not parse pushed chart digest from helm push output" >&2
            exit 1
          fi
          cosign sign --yes \
            --fulcio-url "$FULCIO_URL" --rekor-url "$REKOR_URL" "$REF"
          porter attest --emit predicate --source-ref "refs/tags/${TAG}" > predicate.json
          cosign attest --yes \
            --fulcio-url "$FULCIO_URL" --rekor-url "$REKOR_URL" \
            --predicate predicate.json --type slsaprovenance1 "$REF"

      # ----- npm-package -------------------------------------------------
      # Token auth: `token` rows read their token from the registry-auth JSON
      # secret; a default-registry row with no declared auth falls back to the
      # `npm-token` secret.
      - name: Publish npm package
        if: matrix.kind == 'npm-package'
        env:
          AUTH_KIND: ${{ matrix.auth_kind }}
          TOKEN_SECRET: ${{ matrix.token_secret }}
          REGISTRY_AUTH: ${{ secrets.registry-auth }}
          NPM_TOKEN_FALLBACK: ${{ secrets.npm-token }}
          REGISTRY: ${{ matrix.registry }}
        working-directory: ${{ matrix.path }}
        run: |
          set -euo pipefail
          if [[ "$AUTH_KIND" == "token" ]]; then
            token=$(jq -r --arg k "$TOKEN_SECRET" '.[$k] // empty' <<< "$REGISTRY_AUTH")
          else
            token="$NPM_TOKEN_FALLBACK"
          fi
          if [[ -z "$token" ]]; then
            echo "::error::no npm token (set the registry's token secret in registry-auth, or pass npm-token)" >&2
            exit 1
          fi
          echo "//${REGISTRY#https://}/:_authToken=$token" > .npmrc
          npm publish --access public

      # ----- python-wheel ------------------------------------------------
      - name: Build & upload Python wheel
        if: matrix.kind == 'python-wheel'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ matrix.tag }}
          WHEEL_PATH: ${{ matrix.path }}
        run: |
          set -euo pipefail
          pipx install maturin
          (cd "$WHEEL_PATH" && maturin build --release --out ../dist)
          gh release upload "$TAG" --clobber dist/*.whl

  publish:
    needs: [tag, build]
    if: always() && needs.tag.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # credential: github.token — downloads/re-uploads release assets; API
      # calls, not ref writes.
      - name: Merge per-row checksums into each release
        env:
          GH_TOKEN: ${{ github.token }}
          TAGS: ${{ needs.tag.outputs.tags }}
        run: |
          set -euo pipefail
          # For each release this run cut, pull its per-row checksums-<id>.txt
          # assets, concatenate, and re-upload the canonical checksums.txt the
          # setup-porter action verifies against. Trust model: only the porter
          # App can upload to a release (repo ruleset), so any checksums-* here
          # is App-authored.
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            names=$(gh release view "$tag" --json assets --jq '.assets[].name' | grep '^checksums-' || true)
            [[ -z "$names" ]] && continue
            workdir=$(mktemp -d)
            for asset in $names; do
              gh release download "$tag" --pattern "$asset" --dir "$workdir" --clobber
            done
            cat "$workdir"/checksums-*.txt | sort -u > "$workdir/checksums.txt"
            gh release upload "$tag" --clobber "$workdir/checksums.txt"
          done <<< "$TAGS"
