name: porter / release

# Reusable workflow for consumer repos. The flow:
#
#   1. tag         — push the `vX.Y.Z` tag (porter App identity).
#   2. plan        — `porter matrix` emits a job matrix from porter.toml.
#   3. build (×N)  — fan out across artifact rows.
#   4. publish     — collect everything into the GitHub Release.
#
# A row is signed when `porter matrix` sets `sign=true` on it (driven by
# the repo's `[signing]` config). The cosign steps below, gated on
# `matrix.sign`, then sign and attach SLSA provenance — by registry
# digest for images/charts, as detached bundles for binaries.

on:
  workflow_call:
    inputs:
      porter-version:
        description: porter CLI version to install.
        required: false
        type: string
        default: latest
    secrets:
      app-token:
        description: |
          Token used to push the release tag. Must be a porter App
          installation token; the repo ruleset will reject tag pushes
          from any other identity.
        required: true
      npm-token:
        description: |
          NPM auth token used by the `npm-package` artifact kind.
          Required only if porter.toml declares a `[[artifacts]]`
          entry of `kind = "npm-package"`.
        required: false

permissions:
  contents: read

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.cut.outputs.tag }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      has-artifacts: ${{ steps.matrix.outputs.has-artifacts }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # Don't persist the App token in git config; the tag push
          # below uses an explicit auth URL so the credential is
          # scoped to a single `git push` invocation.
          persist-credentials: false

      - uses: tractorbeamai/porter/actions/setup-porter@v0
        with:
          version: ${{ inputs.porter-version }}

      - id: cut
        env:
          GH_TOKEN: ${{ secrets.app-token }}
        run: |
          set -euo pipefail
          tag=$(porter release tag)
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "tag $tag already exists; skipping tag push"
          else
            git config user.name "porter[bot]"
            git config user.email "porter[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release $tag"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - id: matrix
        run: |
          set -euo pipefail
          matrix=$(porter matrix --compact)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          rows=$(echo "$matrix" | jq '.include | length')
          if [[ "$rows" -gt 0 ]]; then
            echo "has-artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-artifacts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.app-token }}
          TAG: ${{ steps.cut.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists"
          else
            notes_file=$(mktemp)
            porter release notes > "$notes_file" || true
            gh release create "$TAG" --title "$TAG" --notes-file "$notes_file"
          fi

  build:
    needs: tag
    if: needs.tag.outputs.has-artifacts == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.tag.outputs.matrix) }}
    permissions:
      contents: write
      packages: write
      id-token: write  # OIDC token for cosign keyless signing
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.tag.outputs.tag }}
          persist-credentials: false

      - uses: tractorbeamai/porter/actions/setup-porter@v0
        with:
          version: ${{ inputs.porter-version }}

      # ----- signing prerequisites ---------------------------------------
      # cosign (keyless, via the job's id-token) is installed on every
      # signable row; `matrix.sign` is set by `porter matrix` when
      # `[signing]` is enabled in porter.toml.
      - name: Install cosign
        if: matrix.sign == 'true'
        uses: sigstore/cosign-installer@v3

      # oci-image and helm-chart push to (and sign into) an OCI registry,
      # so they need registry auth. GHCR is logged in automatically with
      # the workflow token. Other registries (ECR, Docker Hub, …) need
      # credentials this reusable workflow can't supply generically — see
      # docs/artifact-kinds.md for how to wire them.
      - name: Log in to GHCR
        if: (matrix.kind == 'oci-image' || matrix.kind == 'helm-chart') && contains(matrix.registry, 'ghcr.io')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # ----- cli-binary --------------------------------------------------
      - name: Add Rust target
        if: matrix.kind == 'cli-binary'
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "$TARGET"

      - name: Build cli-binary
        if: matrix.kind == 'cli-binary'
        env:
          NAME: ${{ matrix.name }}
          TARGET: ${{ matrix.target }}
        run: porter build cli-binary --name "$NAME" --target "$TARGET"

      - name: Upload cli-binary tarball
        if: matrix.kind == 'cli-binary'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.tag.outputs.tag }}
          NAME: ${{ matrix.name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" --clobber "dist/${NAME}-${TARGET}.tar.gz"
          # Per-row checksum file; the publish job merges them later.
          gh release upload "$TAG" --clobber "dist/checksums.txt#checksums-${NAME}-${TARGET}.txt"

      # Sign the tarball and attach SLSA provenance, both keyless via the
      # job's OIDC token. Two detached bundles land on the Release:
      # `.sig.bundle` (a signature `cosign verify-blob` checks) and
      # `.att.bundle` (the provenance `cosign verify-attestation` checks).
      # cosign builds the in-toto statement from the predicate porter
      # emits, setting the subject to the tarball's own digest.
      - name: Sign + attest cli-binary
        if: matrix.kind == 'cli-binary' && matrix.sign == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.tag.outputs.tag }}
          NAME: ${{ matrix.name }}
          TARGET: ${{ matrix.target }}
          FULCIO_URL: ${{ matrix.fulcio_url }}
          REKOR_URL: ${{ matrix.rekor_url }}
        run: |
          set -euo pipefail
          art="dist/${NAME}-${TARGET}.tar.gz"
          sig="dist/${NAME}-${TARGET}.sig.bundle"
          att="dist/${NAME}-${TARGET}.att.bundle"
          cosign sign-blob --yes \
            --fulcio-url "$FULCIO_URL" --rekor-url "$REKOR_URL" \
            --bundle "$sig" "$art"
          # Pin the source ref to the release tag: the build job runs in
          # the caller's context, where GITHUB_REF is the branch.
          porter attest --emit predicate --source-ref "refs/tags/${TAG}" > predicate.json
          cosign attest-blob --yes \
            --fulcio-url "$FULCIO_URL" --rekor-url "$REKOR_URL" \
            --predicate predicate.json --type slsaprovenance1 \
            --bundle "$att" "$art"
          gh release upload "$TAG" --clobber "$sig" "$att"

      # ----- oci-image ---------------------------------------------------
      - name: Set up Docker Buildx
        if: matrix.kind == 'oci-image'
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        id: build_image
        if: matrix.kind == 'oci-image'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: ${{ matrix.platforms }}
          tags: ${{ matrix.registry }}:${{ needs.tag.outputs.tag }}
          provenance: false  # porter issues its own SLSA attestation below

      # Sign the pushed image and attach SLSA provenance by digest (never
      # by tag — the digest is the immutable thing the admission policy
      # gates on). cosign stores both in the registry next to the image.
      - name: Sign + attest image
        if: matrix.kind == 'oci-image' && matrix.sign == 'true'
        env:
          TAG: ${{ needs.tag.outputs.tag }}
          REGISTRY: ${{ matrix.registry }}
          DIGEST: ${{ steps.build_image.outputs.digest }}
          FULCIO_URL: ${{ matrix.fulcio_url }}
          REKOR_URL: ${{ matrix.rekor_url }}
        run: |
          set -euo pipefail
          ref="${REGISTRY}@${DIGEST}"
          cosign sign --yes \
            --fulcio-url "$FULCIO_URL" --rekor-url "$REKOR_URL" "$ref"
          # Pin the source ref to the release tag: the build job runs in
          # the caller's context, where GITHUB_REF is the branch.
          porter attest --emit predicate --source-ref "refs/tags/${TAG}" > predicate.json
          cosign attest --yes \
            --fulcio-url "$FULCIO_URL" --rekor-url "$REKOR_URL" \
            --predicate predicate.json --type slsaprovenance1 "$ref"

      # ----- helm-chart --------------------------------------------------
      - name: Package & push Helm chart
        id: push_chart
        if: matrix.kind == 'helm-chart'
        env:
          TAG: ${{ needs.tag.outputs.tag }}
          CHART: ${{ matrix.chart }}
          REGISTRY: ${{ matrix.registry }}
        run: |
          set -euo pipefail
          # Strip the `v` prefix so `helm package --version` accepts it.
          version="${TAG#v}"
          helm package "$CHART" --version "$version" --app-version "$version" -d dist
          # Glob into an array to avoid the `ls | head -1` antipattern;
          # `helm package` writes exactly one .tgz per invocation.
          shopt -s nullglob
          pkgs=(dist/*.tgz)
          if [[ ${#pkgs[@]} -eq 0 ]]; then
            echo "::error::helm package produced no .tgz in dist/" >&2
            exit 1
          fi
          # Capture helm push output to recover the pushed ref + digest so
          # the signing step can sign by digest. helm writes both to
          # stderr as `Pushed: <ref>` / `Digest: sha256:<hex>`.
          out=$(helm push "${pkgs[0]}" "$REGISTRY" 2>&1)
          echo "$out"
          digest=$(printf '%s\n' "$out" | sed -n 's/^Digest: \(sha256:[0-9a-f]\{64\}\)$/\1/p')
          pushed=$(printf '%s\n' "$out" | sed -n 's/^Pushed: \(.*\)$/\1/p')
          if [[ -n "$digest" && -n "$pushed" ]]; then
            # Drop the `:tag` suffix and pin to the digest.
            echo "ref=${pushed%:*}@${digest}" >> "$GITHUB_OUTPUT"
          fi

      # Sign the pushed chart and attach SLSA provenance by digest, the
      # same way oci-image is handled (a Helm chart in an OCI registry is
      # just another OCI artifact).
      - name: Sign + attest Helm chart
        if: matrix.kind == 'helm-chart' && matrix.sign == 'true'
        env:
          TAG: ${{ needs.tag.outputs.tag }}
          REF: ${{ steps.push_chart.outputs.ref }}
          FULCIO_URL: ${{ matrix.fulcio_url }}
          REKOR_URL: ${{ matrix.rekor_url }}
        run: |
          set -euo pipefail
          if [[ -z "$REF" ]]; then
            echo "::error::could not parse pushed chart digest from helm push output" >&2
            exit 1
          fi
          cosign sign --yes \
            --fulcio-url "$FULCIO_URL" --rekor-url "$REKOR_URL" "$REF"
          # Pin the source ref to the release tag: the build job runs in
          # the caller's context, where GITHUB_REF is the branch.
          porter attest --emit predicate --source-ref "refs/tags/${TAG}" > predicate.json
          cosign attest --yes \
            --fulcio-url "$FULCIO_URL" --rekor-url "$REKOR_URL" \
            --predicate predicate.json --type slsaprovenance1 "$REF"

      # ----- npm-package -------------------------------------------------
      - name: Publish npm package
        if: matrix.kind == 'npm-package'
        env:
          NPM_TOKEN: ${{ secrets.npm-token }}
          REGISTRY: ${{ matrix.registry }}
        working-directory: ${{ matrix.path }}
        run: |
          set -euo pipefail
          if [[ -z "$NPM_TOKEN" ]]; then
            echo "::error::NPM_TOKEN secret not set; pass it via the calling workflow's secrets" >&2
            exit 1
          fi
          echo "//${REGISTRY#https://}/:_authToken=$NPM_TOKEN" > .npmrc
          npm publish --access public

      # ----- python-wheel ------------------------------------------------
      - name: Build & publish Python wheel
        if: matrix.kind == 'python-wheel'
        env:
          WHEEL_PATH: ${{ matrix.path }}
        run: |
          set -euo pipefail
          pipx install maturin
          (cd "$WHEEL_PATH" && maturin build --release --out ../dist)

  publish:
    needs: [tag, build]
    if: always() && needs.tag.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.tag.outputs.tag }}
          persist-credentials: false

      - name: Merge per-row checksums
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # Pull every per-row checksums-<id>.txt asset from the release,
          # concatenate, and re-upload as the canonical checksums.txt the
          # setup-porter action verifies against. Trust model: only the
          # porter App can upload to the release (enforced by the repo
          # ruleset), so any `checksums-*.txt` here is App-authored. If
          # a future change opens uploads to other identities, this merge
          # needs filtering by the matrix row IDs we expect.
          if gh release view "$TAG" --json assets --jq '.assets[].name' \
              | grep -q '^checksums-'; then
            for asset in $(gh release view "$TAG" --json assets \
                --jq '.assets[].name' | grep '^checksums-'); do
              gh release download "$TAG" --pattern "$asset" --dir dist --clobber
            done
            cat dist/checksums-*.txt | sort -u > dist/checksums.txt
            gh release upload "$TAG" --clobber dist/checksums.txt
          fi
