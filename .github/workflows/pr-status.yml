name: porter / pr-status

# Reusable workflow consumer repos call from a `pull_request` trigger to
# post (or update) a sticky comment summarizing what `porter status`
# sees on the PR branch: pending changesets, the computed next version,
# and a soft nudge when no changeset is present.
#
# Non-blocking by design — a missing changeset on a docs / CI / refactor
# PR is fine. The comment is informational, not a gate.

on:
  workflow_call:
    inputs:
      porter-version:
        description: porter CLI version to install.
        required: false
        type: string
        default: latest
      version-branch:
        description: |
          The rolling Version PR's branch. pr-status stays silent on it —
          that PR deliberately carries no changesets (it consumes them), so
          the "no changeset detected" nudge would be wrong and noisy. Match
          `version.yml`'s `branch` input if you've customized it.
        required: false
        type: string
        default: porter/version
      build-from-source:
        description: |
          Build the porter CLI from the checked-out source instead of
          installing a released binary. porter sets this on its own repo so a
          PR that changes the config format or status output is read by the
          porter it ships, not the previously-released one. Consumers leave it
          false and get the released CLI.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  comment:
    # Skip porter's own Version PR; see the `version-branch` input.
    if: github.head_ref != inputs.version-branch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Check out the PR's head so `porter status` reads the
          # changesets the PR actually adds, not main's snapshot.
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      # Acquire porter one of two ways: a released binary for consumers, or a
      # source build for porter's own repo (the released CLI can't parse a PR
      # that changes porter's own config/output — same bootstrap as
      # porter-release.yml).
      - name: Build porter from source
        if: inputs.build-from-source
        run: |
          cargo build --bin porter --locked
          echo "$PWD/target/debug" >> "$GITHUB_PATH"

      - uses: tractorbeamai/porter/actions/setup-porter@24e837ff87438fdb4fc0ba784c666fcb520ea9bc # v0
        if: ${{ !inputs.build-from-source }}
        with:
          version: ${{ inputs.porter-version }}

      - id: status
        run: |
          set -euo pipefail
          json=$(porter status --json)
          echo "$json"
          {
            echo 'json<<PORTER_STATUS_EOF'
            echo "$json"
            echo PORTER_STATUS_EOF
          } >> "$GITHUB_OUTPUT"

      - id: body
        env:
          # Route the JSON through env to keep `${{ ... }}` out of the
          # run block (zizmor `template-injection`).
          STATUS_JSON: ${{ steps.status.outputs.json }}
        run: |
          set -euo pipefail
          body=$(printf '%s' "$STATUS_JSON" | jq -r '
            ([.groups[].changesets[]] | length) as $n
            | if $n == 0 then
                "### 🚛 porter\n\nNo changeset detected. If this PR ships a user-visible change, run `porter add` and push the file. If not (docs, CI, refactor), ignore this comment."
              else
                "### 🚛 porter\n\nThis PR adds **" + ($n | tostring) + " changeset(s)**. On merge:\n\n"
                + ([.groups[] | select(.next) | "- **" + .name + "**: " + .current + " → " + .next + " (" + .bump + ")"] | join("\n"))
                + "\n\n<details><summary>Pending entries</summary>\n\n"
                + ([.groups[].changesets[] | "- **" + .bump + "** — " + .summary] | join("\n"))
                + "\n\n</details>"
              end
          ')
          {
            echo 'body<<PORTER_BODY_EOF'
            echo "$body"
            echo PORTER_BODY_EOF
          } >> "$GITHUB_OUTPUT"

      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          # `header` is marocchino's stickiness marker — re-runs of this
          # job update the same comment instead of stacking new ones.
          header: porter-status
          message: ${{ steps.body.outputs.body }}
