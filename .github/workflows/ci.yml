name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v5

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ matrix.task }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.task }}-

      - name: rustfmt
        if: matrix.task == 'fmt'
        run: cargo fmt --all -- --check

      - name: clippy
        if: matrix.task == 'clippy'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        if: matrix.task == 'test'
        run: cargo test --workspace --all-targets

  build-binaries:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --bin porter

      - name: Smoke-run --version
        run: ./target/${{ matrix.target }}/release/porter --version
