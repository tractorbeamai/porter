name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: workflow-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      # actionlint: GitHub Actions workflow linter (Go binary). Catches
      # workflow syntax errors, expression typos, undefined matrix
      # variables, deprecated runner labels. Bundles shellcheck under
      # the hood and runs it against every `run:` block.
      - name: actionlint
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  # zizmor: security-focused Actions linter. Catches template injection,
  # persistent-credentials checkout, untrusted-input patterns, etc.
  # Repo-wide policies live in .github/zizmor.yml (auto-discovered).
  #
  # Runs as the official action (zizmorcore/zizmor-action) with online
  # audits on by default — these query the GitHub API via github.token
  # and findings upload to the Security tab as SARIF. The SARIF upload
  # needs security-events: write, so zizmor lives in its own job rather
  # than sharing workflow-lint's contents-read-only scope.
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: zizmor
        uses: zizmorcore/zizmor-action@v0.5.6

  setup-porter-bats:
    name: setup-porter bats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      # Static-check setup.sh before running the unit tests; bats
      # catches behavioral bugs, shellcheck catches quoting/word-split
      # bugs the unit tests can't.
      - name: shellcheck setup.sh
        run: shellcheck actions/setup-porter/setup.sh

      - name: bats setup.bats
        run: bats actions/setup-porter/tests/setup.bats

  check:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ matrix.task }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.task }}-
            cargo-${{ runner.os }}-

      - name: rustfmt
        if: matrix.task == 'fmt'
        run: cargo fmt --all -- --check

      - name: clippy
        if: matrix.task == 'clippy'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        if: matrix.task == 'test'
        run: cargo test --workspace --all-targets

  build-binaries:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-14
    env:
      # matrix.target is repo-controlled (the include block above), but
      # route through env to keep the run blocks free of template
      # expansion — the standard zizmor pattern.
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Add target
        run: rustup target add "$TARGET"

      - name: Build release
        run: cargo build --release --target "$TARGET" --bin porter

      - name: Smoke-run --version
        run: ./target/"$TARGET"/release/porter --version
