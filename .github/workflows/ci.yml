name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    # pull-requests: write lets reviewdog post inline review comments.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # actionlint: linter for GitHub Actions workflows — syntax errors,
      # bad expressions, deprecated runners, shellcheck on run blocks.
      # Wrapped by reviewdog so findings surface as inline PR comments;
      # fail_level: error keeps real problems blocking the build.
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          fail_level: error
          reporter: github-pr-review

  # zizmor: static analysis for GitHub Actions, catching security issues
  # like template injection and over-broad token permissions. Its online
  # audits need security-events: write to upload SARIF, so it gets its
  # own job rather than widening workflow-lint's scope.
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # Patch-pinned (not a floating major like other actions) because
      # zizmor-action publishes no `v0` tag; Renovate bumps it.
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6

  setup-porter-bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      # Static-check setup.sh before running the unit tests; bats
      # catches behavioral bugs, shellcheck catches quoting/word-split
      # bugs the unit tests can't.
      - name: shellcheck setup.sh
        run: shellcheck actions/setup-porter/setup.sh

      - name: bats setup.bats
        run: bats actions/setup-porter/tests/setup.bats

  check:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Cache cargo registry & target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ matrix.task }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.task }}-
            cargo-${{ runner.os }}-

      - name: rustfmt
        if: matrix.task == 'fmt'
        run: cargo fmt --all -- --check

      # `--locked` here is deliberate: it fails CI if Cargo.lock drifts from
      # Cargo.toml, instead of letting the gap surface only in the release
      # workflow (which builds `--locked`). Keeps the committed lock honest.
      - name: clippy
        if: matrix.task == 'clippy'
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: test
        if: matrix.task == 'test'
        run: cargo test --workspace --all-targets --locked

  # cargo-deny advisories: audit the dependency graph against the RustSec
  # advisory database. Mirrors constellation's rustsec toolchain; policy
  # (and any accepted advisories) lives in deny.toml.
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check advisories

  build-binaries:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-14
    env:
      # matrix.target is repo-controlled (the include block above), but
      # route through env to keep the run blocks free of template
      # expansion — the standard zizmor pattern.
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Add target
        run: rustup target add "$TARGET"

      - name: Build release
        run: cargo build --release --target "$TARGET" --bin porter

      - name: Smoke-run --version
        run: ./target/"$TARGET"/release/porter --version
