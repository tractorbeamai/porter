name: pr-status-self

# porter dogfoods its own pr-status reusable workflow on every PR
# against main. `build-from-source: true` makes it run the porter the PR
# ships (the released CLI can't parse a PR that changes porter's own
# config/output). Comment is informational and non-blocking; see
# `pr-status.yml` for the body shape.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-status-self-${{ github.ref }}
  cancel-in-progress: true

jobs:
  status:
    uses: ./.github/workflows/pr-status.yml
    with:
      build-from-source: true
