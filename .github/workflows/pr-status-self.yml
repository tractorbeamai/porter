name: pr-status-self

# porter dogfoods its own pr-status reusable workflow on every PR
# against main. Comment is informational and non-blocking; see
# `pr-status.yml` for the body shape.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-status-self-${{ github.ref }}
  cancel-in-progress: true

jobs:
  status:
    uses: ./.github/workflows/pr-status.yml
