name: porter-release

# Builds and publishes porter's own binaries when a `vX.Y.Z` tag is pushed.
# This is what `setup-porter` consumes from the GitHub Releases page.
#
# The matrix is generated by `porter matrix --kind cli-binary` so the
# tag's source-of-truth for which targets to publish is `porter.toml`,
# not this YAML file.
#
# Bootstrap dance: each matrix row first builds the host-architecture
# `porter` binary from source (`cargo build --bin porter`), then runs
# `./target/release/porter build cli-binary --target X` to cross-compile
# for the matrix target. The host porter is just the conductor; the
# target porter is the artifact uploaded to the release.
#
# Credential policy: see README "Privileged tagger".

on:
  push:
    # Full semver tags only (porter emits `vX.Y.Z`). Deliberately NOT `v*`:
    # the `float-tag` job below force-moves the floating major tag (e.g. `v0`),
    # and matching `v*` would re-trigger this workflow in a loop. `v*.*.*`
    # requires two dots, so `v0` never matches.
    tags: ["v*.*.*"]
  # Manual trigger for re-running a release if a job flaked.
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to (re)build artifacts for.
        required: true

permissions:
  contents: read

concurrency:
  group: porter-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: plan matrix
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false

      - name: Build porter (host)
        run: cargo build --release --bin porter --locked

      - id: tag
        env:
          # workflow_dispatch input is user-controlled; route through
          # env to neutralize template injection.
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_TAG" ]]; then
            tag="$INPUT_TAG"
          else
            tag="${GITHUB_REF##*/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - id: matrix
        run: |
          set -euo pipefail
          matrix=$(./target/release/porter matrix --kind cli-binary --compact)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix"

  build:
    name: build (${{ matrix.target }})
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    env:
      # Matrix fields come from `porter matrix`'s JSON output, which
      # ultimately reads porter.toml in the tagged ref. Route through
      # env to keep run blocks free of template expansion.
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.plan.outputs.tag }}
          persist-credentials: false

      - name: Add target
        run: rustup target add "$TARGET"

      - name: Bootstrap porter (host)
        run: cargo build --release --bin porter --locked

      - name: Build artifact
        run: ./target/release/porter build cli-binary --target "$TARGET"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.id }}
          path: |
            dist/${{ matrix.name }}-${{ matrix.target }}.tar.gz
            dist/checksums.txt
          if-no-files-found: error

  publish:
    name: publish release
    needs: [plan, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # OIDC token for cosign keyless signing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.plan.outputs.tag }}
          # This job writes no git refs — release create/upload go through the
          # GitHub API — so no credentials need persisting. The floating major
          # tag is moved by the isolated `float-tag` job below.
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: false

      - name: Assemble dist
        run: |
          set -euo pipefail
          mkdir -p dist
          # One tarball per matrix row plus per-row checksums.txt; merge
          # all checksum lines into a single dist/checksums.txt.
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          find artifacts -name 'checksums.txt' -exec cat {} \; \
            | sort -u > dist/checksums.txt
          ls -la dist
          cat dist/checksums.txt

      - name: Build porter (host) for release notes
        run: cargo build --release --bin porter --locked

      # credential: github.token — release create/upload are GitHub API calls
      # on an already-pushed tag, not ref writes, so the auto-scoped token
      # (contents: write above) is enough; no App identity needed.
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail
          # Create the release if it doesn't exist yet (workflow_dispatch
          # path may run against an existing tag without a release).
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            notes_file=$(mktemp)
            ./target/release/porter release notes > "$notes_file" || true
            gh release create "$TAG" --title "$TAG" --notes-file "$notes_file"
          fi
          gh release upload "$TAG" --clobber dist/*.tar.gz dist/checksums.txt

      # Dogfood: when porter.toml opts into signing, porter signs its own
      # binaries exactly the way the reusable release.yml signs a
      # consumer's cli-binary artifacts. Signing is opt-in, so this is
      # gated on porter.toml's [signing] block (off ⇒ these steps skip).
      - name: Determine signing
        id: signing
        run: |
          set -euo pipefail
          enabled=$(./target/release/porter matrix --kind cli-binary --compact \
            | jq -r '[.include[].sign] | any')
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: steps.signing.outputs.enabled == 'true'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      # credential: github.token — cosign signs keyless via OIDC (id-token:
      # write above); the token here only uploads the bundles to the release.
      - name: Sign + attest binaries
        if: steps.signing.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail
          # Pin the source ref to the tag explicitly: on the
          # workflow_dispatch path GITHUB_REF is the branch, not the tag.
          ./target/release/porter attest --emit predicate \
            --source-ref "refs/tags/${TAG}" > predicate.json
          for art in dist/*.tar.gz; do
            base="$(basename "$art" .tar.gz)"
            sig="dist/${base}.sig.bundle"
            att="dist/${base}.att.bundle"
            cosign sign-blob --yes --bundle "$sig" "$art"
            cosign attest-blob --yes \
              --predicate predicate.json --type slsaprovenance1 \
              --bundle "$att" "$art"
            gh release upload "$TAG" --clobber "$sig" "$att"
          done

  # `setup-porter@v0` pins to the major-version line, so each release must
  # force-move the floating major tag (e.g. `v0`) forward — mirroring how
  # actions/checkout@v5, actions/cache@v4, etc. work. This is a write to a
  # ruleset-protected `v*` ref, so it must be the porter App (GITHUB_TOKEN
  # isn't a bypass actor). Kept in its own job — not folded into `publish` —
  # so the App private key never sits alongside cargo builds, downloaded
  # artifacts, and the cosign installer. Mirrors version-self.yml's mint job.
  # The `v*.*.*` trigger above ensures moving `v0` doesn't re-trigger us.
  float-tag:
    name: move floating major tag
    needs: [plan, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout only; the App token below carries its own write scope
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.plan.outputs.tag }}
          # Full history so `git tag -f "$major" "$TAG"` can resolve the tag.
          fetch-depth: 0
          persist-credentials: false

      # credential: app-token — force-moving the protected `v*` floating tag;
      # porter-tag-protection lets only the porter App write v*. Scoped to
      # contents (tag push only).
      - id: app-token
        uses: ./actions/mint-porter-token
        with:
          app-id: ${{ secrets.PORTER_APP_ID }}
          private-key: ${{ secrets.PORTER_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Move floating major tag
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail
          major=$(echo "$TAG" | sed -E 's/^(v[0-9]+).*/\1/')
          if [[ -z "$major" || "$major" == "$TAG" ]]; then
            echo "tag $TAG does not match v<major>… pattern; skipping"
            exit 0
          fi
          git config user.name "porter[bot]"
          git config user.email "porter[bot]@users.noreply.github.com"
          git tag -f "$major" "$TAG"
          # Explicit auth URL scopes the credential to this single push
          # (checkout set `persist-credentials: false`).
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$major"
