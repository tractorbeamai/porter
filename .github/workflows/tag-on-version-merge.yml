name: tag-on-version-merge

# When a commit that bumps the workspace version lands on main —
# typically the merged "Version Packages" PR opened by `version.yml`,
# but also any manual `porter version` commit — push the matching
# `v*` annotated tag using the porter App identity. That tag push is
# what fires `porter-release.yml` to build and publish.
#
# Detection is structural, not message-based: ask porter what tag the
# current state would carry (`porter release tag`), and push it if
# the remote doesn't already have it. Idempotent — re-runs on the
# same commit are a no-op.
#
# Credential policy: see README "Privileged tagger".

on:
  push:
    branches: [main]

permissions:
  contents: read

# Serialize main pushes so concurrent runs can't race on the tag push;
# don't cancel an in-flight tag/release mid-push.
concurrency:
  group: tag-on-version-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # Build porter from source rather than installing the released CLI: the
      # commit that just landed may change porter's own config format, which a
      # prior release can't parse. Same bootstrap as porter-release.yml.
      - name: Build porter from source
        run: |
          cargo build --bin porter --locked
          echo "$PWD/target/debug" >> "$GITHUB_PATH"

      - id: tag
        run: |
          set -euo pipefail
          # `porter release tag` prints one tag per published component across
          # every group (one line each). Push only the ones the remote doesn't
          # already have, so unchanged groups are no-ops.
          pending=""
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "refs/tags/${tag}$"; then
              echo "${tag} already exists on origin; skipping"
            else
              pending+="${tag}"$'\n'
            fi
          done < <(porter release tag)
          if [[ -z "$pending" ]]; then
            echo "no new tags to push"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "tags<<__PORTER_EOF__"
            printf '%s' "$pending"
            echo "__PORTER_EOF__"
          } >> "$GITHUB_OUTPUT"

      # credential: app-token — the vX.Y.Z tag is ruleset-protected (only the
      # porter App may write v*) and its push must trigger porter-release.yml,
      # which a GITHUB_TOKEN push wouldn't. Scoped to contents (tag push only).
      - id: app-token
        if: steps.tag.outputs.skip != 'true'
        uses: ./actions/mint-porter-token
        with:
          app-id: ${{ secrets.PORTER_APP_ID }}
          private-key: ${{ secrets.PORTER_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Push tags
        if: steps.tag.outputs.skip != 'true'
        env:
          # The App token is masked, but route it through env anyway
          # to keep `${{ ... }}` out of the run block.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAGS: ${{ steps.tag.outputs.tags }}
        run: |
          set -euo pipefail
          git config user.name "porter[bot]"
          git config user.email "porter[bot]@users.noreply.github.com"
          # Create every pending tag, then push exactly those refs in one shot.
          # Scope the credential to a single push via explicit auth URL — the
          # checkout step set `persist-credentials: false` so this token isn't
          # written into git config.
          refs=()
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            git tag -a "$tag" -m "$tag"
            refs+=("refs/tags/$tag")
          done <<< "$TAGS"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${refs[@]}"
